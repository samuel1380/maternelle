services:
  - type: web
    name: maternelle-estetica
    env: static
    buildCommand: ""
    publishPath: "./"
    headers:
      - path: "/*"
        name: "Cache-Control"
        value: "public, max-age=0, must-revalidate"
      - path: "/assets/*"
        name: "Cache-Control"
        value: "public, max-age=31536000, immutable"
